<!DOCTYPE html>
<html>
<head>
<title>Friday Night Funkin' Browser</title>
<link rel="shortcut icon" type="image/jpg" href="https://github.com/ninjamuffin99/Funkin/blob/master/art/iconOG.png?raw=true"/>
<style>
body {
    background-image: url('https://raw.githubusercontent.com/ninjamuffin99/Funkin/master/docs/img/skin-funkin-cardbordtoast.jpg');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    font-family: Arial, Helvetica, sans-serif;
    color:white;
    text-align: center;
}
#wrapper
{
    padding: 20px;
    margin: auto;
}
.coolBox {
    background: #1a1a1aCC;
    margin: 40px 4vw;
    padding: 25px;
    font-size: 120%;
    border-radius: 10px;
}
a { color:inherit;
  text-decoration: none;}


.hovertext a{
    color:white;
    text-shadow: 0px 0px #00000077;
    transition: color 1s, text-shadow 1s;
}

.hovertext a:hover
{
    text-shadow: 2px 2px #00000077;
    color: #ffb50e;
}

.linktext {
    text-align: center;
    display:block;
    font-size: 130%;
    padding-bottom: 10px;
}

.linktext a {
    font-weight: bold;  
}

.linktext a:hover {
  border-radius: 5px;
}

#itch a:hover
{
    color: #fa5c5c;
}
#twitter a:hover
{
    color: #00acee;
}


#coolervidwrapper {
    padding-left: min(12em, 75%);
    padding-right: min(12em, 75%);
    min-width: 30%;
}
.link {
	opacity: 50%;
    transition: 1s;
    box-shadow: 0px 0px #00000077;
}
.link:hover {
	opacity: 100%;
    box-shadow: 0px 2px #00000077;
}
.freeplay:hover {
	opacity: 100%;
    box-shadow: 0px 2px #453de1;
}
.storymode:hover {
	opacity: 100%;
    box-shadow: 0px 2px #e18c33;
}
</style>
<meta id="meta-title" property="og:title" content="Friday Night Funkin' Browser">
<meta id="meta-image" name="og:image" itemprop="image" content="https://github.com/ninjamuffin99/Funkin/blob/master/art/iconOG.png?raw=true">
<meta id="meta-desc" property="og:description" content="We gettin' freaky on a Friday night yeah">
</head>
<body>
<audio autoplay="" loop="">
<source src="https://github.com/ninjamuffin99/Funkin/blob/master/assets/shared/music/breakfast.mp3?raw=true">
</audio>
<div id="wrapper">
<h1>Friday Night Funkin' Browser <sup style="opacity: 50%;"><small>BETA</small></sup></h1>
<br>
<a class="link storymode" href="/fnfbrowser/weeks"><img src="https://raw.githubusercontent.com/lexiolvsu/lexiolvsu.github.io/main/fnfbrowser/storymode.png" width="150" height="auto"></a>
<a class="link freeplay" href="/fnfbrowser/songs"><img src="https://raw.githubusercontent.com/lexiolvsu/lexiolvsu.github.io/main/fnfbrowser/freeplay.png" width="150" height="auto"></a>
<br>
		<div class="coolBox hovertext" id="twitter">
			<p class="description">Friday Night Funkin' is a dope ass rhythm game.</p>
			<p class='description'>It is made by <a href="https://twitter.com/ninja_muffin99">ninjamuffin99 (programmer)</a>, <a
				href="https://twitter.com/PhantomArcade3K">PhantomArcade (animator)</a>, <a
				href="https://twitter.com/evilsk8r">evilsk8r (artist)</a>,
			and <a href="https://twitter.com/kawaisprite">Kawaisprite (musician)</a> originally for Ludum Dare 47.</p>
		</div>

		<div class="linktext hovertext" id="ng">
			<a href="https://www.newgrounds.com/portal/view/770371">Play demo on Newgrounds</a>
		</div>

		<div class='linktext hovertext' id="itch">
			<a href="https://ninja-muffin24.itch.io/funkin">Support the game on Itch.io</a>
		</div>

</body>
</html>
